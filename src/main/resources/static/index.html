<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/usuarios.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CITAS APP</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="./index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="./usuarios.html">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="./citas.html">Citas</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="text-center">Gestión de Usuarios</h1>

    <!-- Buscar usuario -->
    <form onsubmit="buscarUsuario(); return false;" class="mb-4">
        <label>ID del usuario</label>
        <input id="usuarioInput" type="text" class="form-control" required>
        <button class="btn btn-primary mt-2" type="submit">Buscar</button>
    </form>

    <!-- Crear usuario -->
    <form onsubmit="crearUsuario(); return false;" class="mb-4">
        <h2>Crear nuevo usuario</h2>
        <input id="nombre" type="text" class="form-control mb-2" placeholder="Nombre" required>
        <input id="matricula" type="text" class="form-control mb-2" placeholder="Matrícula" required>
        <input id="correo" type="email" class="form-control mb-2" placeholder="Correo" required>
        <input id="telefono" type="text" class="form-control mb-2" placeholder="Teléfono">
        <input id="tipoUsuario" type="text" class="form-control mb-2" placeholder="Tipo de usuario">
        <input id="idExpediente" type="text" class="form-control mb-2" placeholder="ID Expediente">
        <button class="btn btn-success" type="submit">Crear</button>
    </form>

    <!-- Actualizar usuario -->
    <form onsubmit="actualizarUsuario(); return false;" class="mb-4">
        <h2>Actualizar usuario</h2>
        <input id="updateId" type="text" class="form-control mb-2" placeholder="ID" required>
        <input id="updateNombre" type="text" class="form-control mb-2" placeholder="Nuevo nombre">
        <input id="updateMatricula" type="text" class="form-control mb-2" placeholder="Nueva matrícula">
        <input id="updateCorreo" type="email" class="form-control mb-2" placeholder="Nuevo correo">
        <input id="updateTelefono" type="text" class="form-control mb-2" placeholder="Nuevo teléfono">
        <input id="updateTipoUsuario" type="text" class="form-control mb-2" placeholder="Nuevo tipo de usuario">
        <input id="updateExpediente" type="text" class="form-control mb-2" placeholder="Nuevo ID Expediente">
        <button class="btn btn-warning" type="submit">Actualizar</button>
    </form>

    <!-- Eliminar usuario -->
    <form onsubmit="eliminarUsuario(); return false;" class="mb-4">
        <h2>Eliminar usuario</h2>
        <input id="deleteId" type="text" class="form-control mb-2" placeholder="ID" required>
        <button class="btn btn-danger" type="submit">Eliminar</button>
    </form>

    <!-- Resultado -->
    <div id="resultado" class="alert mt-4" style="display:none;"></div>
</div>

<script src="./js/usuarios.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
