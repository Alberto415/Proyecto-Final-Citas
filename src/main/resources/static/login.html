<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login - UAM Citas</title>
    <style>
        body {
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: 100%;
            max-width: 420px;
            border-top: 4px solid #1a3a6b;
        }
        .titulo { color: #1a3a6b; font-weight: 700; }
    </style>
</head>
<body>

<div class="card shadow">
    <div class="card-body p-4">
        <h4 class="titulo text-center mb-1">UAM Citas</h4>
        <p class="text-center text-muted small mb-4">Inicia sesión para continuar</p>

        <div id="error-msg" class="alert alert-danger d-none">
            Usuario o contraseña incorrectos.
        </div>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="alumno o admin" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <hr>

        <p class="text-center mt-3 small">
            <a href="/tablero.html">Ver tablero público sin login</a>
        </p>
    </div>
</div>

<script>
    if (window.location.search.includes('error')) {
        document.getElementById('error-msg').classList.remove('d-none');
    }
</script>

</body>
</html>
